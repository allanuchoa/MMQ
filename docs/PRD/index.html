<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora MMQ - Ajuste Polinomial</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Método dos Mínimos Quadrados</h1>
            <p style="color: var(--text-secondary)">Ajuste de curvas polinomiais</p>
        </header>

        <main>
            <!-- Left Column: Inputs -->
            <section class="panel">
                <div class="card">
                    <div class="input-grid">
                        <div class="form-group">
                            <label for="degree">Ordem do Polinômio</label>
                            <input type="number" id="degree" value="1" min="1" max="10">
                        </div>
                        
                        <div class="form-group">
                            <label for="x-values">Valores de X</label>
                            <input type="text" id="x-values" placeholder="Ex: 1, 2, 3, 4, 5">
                            <small style="color: var(--text-secondary)">Separados por vírgula ou espaço</small>
                        </div>
                        
                        <div class="form-group">
                            <label for="y-values">Valores de Y</label>
                            <input type="text" id="y-values" placeholder="Ex: 2.1, 3.9, 6.1, 8.2, 9.8">
                            <small style="color: var(--text-secondary)">Separados por vírgula ou espaço</small>
                        </div>
                    </div>

                    <div class="actions">
                        <button class="btn btn-primary" onclick="calculateMMQ()">Calcular Ajuste</button>
                    </div>

                    <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 24px 0;">

                    <div class="form-group">
                        <label style="color: var(--accent-color); font-weight: 600;">Simular Novos Valores</label>
                        <label for="new-x-values">Novos X</label>
                        <input type="text" id="new-x-values" placeholder="Ex: 6, 7.5, 10">
                    </div>
                    
                    <div class="actions">
                        <button class="btn btn-secondary" onclick="calculateNewY()">Calcular Y</button>
                    </div>

                    <div id="prediction-result" style="display: none; margin-top: 16px; background: var(--bg-color); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color);">
                        <label class="result-label">Resultados (Y)</label>
                        <div id="new-y-values" class="result-value" style="font-size: 0.8rem; max-height: 100px; overflow-y: auto;"></div>
                    </div>
                </div>

                <!-- Excel Formula Box (initially hidden) -->
                <div class="excel-box" id="excel-box" style="display: none; flex-direction: row;">
                    <div class="excel-icon">X</div>
                    <div class="excel-content">
                        <div class="excel-formula" id="excel-formula-display">=Formula...</div>
                        <div class="excel-label">Fórmula para Excel (copie e cole)</div>
                    </div>
                    <button class="copy-btn-small" onclick="copyToExcel()">Copiar</button>
                </div>
            </section>

            <!-- Right Column: Results & Chart -->
            <section class="chart-section" id="results" style="display: none;">
                <div class="results-grid">
                    <div class="result-box">
                        <span class="result-label">Polinômio Ajustado</span>
                        <div id="polynomial-display" class="result-value"></div>
                    </div>
                    
                    <div class="result-box">
                        <span class="result-label">Erro Quadrático Total</span>
                        <div id="error-display" class="result-value"></div>
                    </div>
                </div>

                <div class="chart-container-wrapper">
                    <div class="chart-container">
                        <canvas id="mmqChart"></canvas>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
